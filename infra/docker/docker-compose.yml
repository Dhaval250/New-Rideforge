version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rideforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/server.Dockerfile
    environment:
      PORT: 4000
      JWT_SECRET: change-me
      CORS_ORIGIN: "*"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/rideforge
      REDIS_URL: redis://redis:6379
      PAYMENT_PROVIDER: stripe
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  mobile:
    build:
      context: ../..
      dockerfile: infra/docker/mobile.Dockerfile
    ports:
      - "19006:19006"
    environment:
      EXPO_PUBLIC_API_URL: http://localhost:4000

volumes:
  pg_data:
